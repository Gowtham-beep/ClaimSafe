user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time uat=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Upstream backend Fastify service
    upstream api {
        server api:3000;
    }

    # Upstream to PDF extraction microservice
    upstream pdf-service {
        server pdf-service:8000;
    }

    # Upstream to the compiled React frontend served as static files.
    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # Forward REST API requests to backend Fastify server
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Forward correlation ID
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # Forward PDF service requests to Python FastAPI microservice
        location /pdf/ {
            rewrite ^/pdf/(.*)$ /$1 break;
            proxy_pass http://pdf-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Forward correlation ID
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # Forward all client requests to Vite React client dev server
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Forward correlation ID
            proxy_set_header X-Request-ID $http_x_request_id;
        }
    }
}
